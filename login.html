<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Time – تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0f2044; --navy2:#1a2e5a; --teal:#4ab8c1; --orange:#e8652a; --orange2:#d45520;
  --text-muted:#8a9bbf; --white:#fff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
body::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(74,184,193,.13) 0%,transparent 70%);top:-150px;right:-150px;border-radius:50%;animation:pulse 6s ease-in-out infinite;}
body::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(232,101,42,.09) 0%,transparent 70%);bottom:-100px;left:-100px;border-radius:50%;animation:pulse 8s ease-in-out infinite reverse;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.7;}50%{transform:scale(1.2);opacity:1;}}
.circles{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.circle{position:absolute;border-radius:50%;border:1px solid rgba(74,184,193,.1);}
.circle:nth-child(1){width:200px;height:200px;top:10%;left:5%;animation:rot 20s linear infinite;}
.circle:nth-child(2){width:300px;height:300px;bottom:15%;right:8%;animation:rot 30s linear infinite reverse;border-color:rgba(232,101,42,.07);}
.circle:nth-child(3){width:100px;height:100px;top:60%;left:15%;animation:rot 15s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
.wrap{position:relative;z-index:10;width:100%;max-width:430px;padding:20px;}
.logo-sec{text-align:center;margin-bottom:34px;animation:fdown .8s ease both;}
@keyframes fdown{from{opacity:0;transform:translateY(-24px);}to{opacity:1;transform:translateY(0);}}
.logo-frame{display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.98);padding:12px 16px;border-radius:26px;box-shadow:0 18px 45px rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.18);}
.logo-img{width:210px;max-width:100%;height:auto;display:block;}
.logo-note{font-size:13px;color:var(--teal);font-weight:700;margin-top:14px;}
.card{background:rgba(255,255,255,.04);backdrop-filter:blur(18px);border:1px solid rgba(74,184,193,.15);border-radius:22px;padding:38px 34px;animation:fup .8s ease .2s both;}
@keyframes fup{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.card-title{font-size:19px;font-weight:700;text-align:center;margin-bottom:5px;}
.card-sub{font-size:12px;color:var(--text-muted);text-align:center;margin-bottom:28px;}
.fg{margin-bottom:18px;}
.flabel{font-size:12px;font-weight:700;color:var(--teal);display:block;margin-bottom:7px;}
.fw{position:relative;}
.ficon{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text-muted);}
.finput{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(74,184,193,.2);border-radius:11px;padding:12px 40px 12px 14px;color:var(--white);font-family:'Cairo',sans-serif;font-size:14px;outline:none;transition:all .25s;text-align:right;}
.finput::placeholder{color:rgba(255,255,255,.22);}
.finput:focus{border-color:var(--teal);background:rgba(74,184,193,.07);box-shadow:0 0 0 3px rgba(74,184,193,.1);}
.login-btn{width:100%;background:linear-gradient(135deg,var(--orange),var(--orange2));color:var(--white);border:none;border-radius:11px;padding:14px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:24px;transition:all .25s;box-shadow:0 6px 20px rgba(232,101,42,.28);}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(232,101,42,.38);}
.login-btn:active{transform:translateY(0);}
.error{background:rgba(232,101,42,.1);border:1px solid rgba(232,101,42,.28);border-radius:9px;padding:11px 14px;color:#ff8a5b;font-size:12px;text-align:center;margin-top:14px;display:none;}
.error.show{display:block;animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}
.footer{text-align:center;color:var(--text-muted);font-size:11px;margin-top:22px;}
.footer span{color:var(--teal);}
</style>
</head>
<body>
<div class="circles"><div class="circle"></div><div class="circle"></div><div class="circle"></div></div>
<div class="wrap">
  <div class="logo-sec">
    <div class="logo-frame">
      <img class="logo-img" src="/static/logo.jpg" alt="Clean Time Logo">
    </div>
    <div class="logo-note">نظام وقت النظافة</div>
  </div>
  <div class="card">
    <form id="loginForm">
      <div class="card-title">مرحباً بك 👋</div>
      <div class="card-sub">سجّل دخولك للمتابعة</div>
      <div class="fg">
        <label class="flabel" for="user">اسم المستخدم</label>
        <div class="fw"><span class="ficon">👤</span>
          <input class="finput" id="user" name="username" type="text" placeholder="أدخل اسم المستخدم" autocomplete="username">
        </div>
      </div>
      <div class="fg">
        <label class="flabel" for="pass">كلمة المرور</label>
        <div class="fw"><span class="ficon">🔒</span>
          <input class="finput" id="pass" name="password" type="password" placeholder="أدخل كلمة المرور" autocomplete="current-password">
        </div>
      </div>
      <button class="login-btn" id="loginBtn" type="submit">دخول</button>
      <div class="error" id="err" role="alert" aria-live="polite"></div>
    </form>
  </div>
  <div class="footer">Clean Time &copy; 2025 — <span>وقت النظافة</span></div>
</div>
<script src="shared.js"></script>
<script src="login.js"></script>
</body>
</html>
